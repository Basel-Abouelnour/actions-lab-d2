        #     docker tag ${{ secrets.ECR_REPOSITORY }}:IMAGE_TAG ${{ secrets.ECR_REPOSITORY }}/${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG
        #     docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        # # - name: Upload build artifact
        # # # Store the packaged output so a later workflow can use the exact same package.
        # #   uses: actions/upload-artifact@v4
        # #   with:
        # #     name: ${{ env.ARTIFACT_NAME }}
