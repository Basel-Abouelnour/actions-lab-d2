name: EX-10 Continuos Integration

on:
  # Run automatically when app code, tests, or this workflow file changes.
  pull_request:
    types:
    - opened
    - edited
    - reopened
    - synchronize
    branches:
    - main
    # Allow a safe manual run before students trigger it with a code change.
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

# env:

env:
  # Keep common image values in one place so the build steps stay readable.
  IMAGE_NAME: tiny-health-app
  IMAGE_TAR: tiny-health-app.tar
  ARTIFACT_NAME: tiny-health-app-image 
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: actions/lab
  IMAGE_TAG: ${{ github.run_id }}

jobs:
  run-tests:
    # The runner is the temporary machine that executes the steps below.
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        # Download the repository contents onto the runner.
        uses: actions/checkout@v6

      - name: Set up Python
        # Prepare Python on the runner. This does not change the student laptop.
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run tests
        # This is the key verification step in the CI workflow.
        run: python -m unittest discover -s tests -v

  build-package:
    # Use a fresh GitHub-hosted runner for the build.
    runs-on: ubuntu-latest
    needs: run-tests

    steps:
        - name: Check out repository
        # Get the repository files onto the runner.
          uses: actions/checkout@v6

        - name: Set up Python
        # Prepare Python so the workflow can run the tests first.
          uses: actions/setup-python@v6
          with:
              python-version: "3.12"

        - name: Configure AWS Credentials (OIDC)
          uses: aws-actions/configure-aws-credentials@v4
          with:
            role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/actions-ecr
            aws-region: ${{ env.AWS_REGION }}
      
        - name: Fetch the caller identity
          run: | 
            aws sts get-caller-identity

        - name: Login to ECR
          run: |
            aws ecr get-login-password --region $AWS_REGION \
            | docker login --username AWS --password-stdin $ECR_REGISTRY

        - name: Build & Tag Image
          run: |
            docker build -t $ECR_REPOSITORY:$IMAGE_TAG .
            docker tag $ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
            docker tag $ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest


        - name: Run Trivy vulnerability scanner
          uses: aquasecurity/trivy-action@0.35.0
          with:
            image-ref: '$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG'
            format: 'table'
            exit-code: '1'
            ignore-unfixed: true
            vuln-type: 'os,library'
            severity: 'CRITICAL,HIGH'


        - name: Push Image to ECR
          run: | 
            docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
            docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest