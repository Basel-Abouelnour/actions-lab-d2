name: EX-10 Continuos Integration

on:
  # Run automatically when app code, tests, or this workflow file changes.
  pull_request:
    types:
    - opened
    - edited
    - reopened
    - synchronize
    branches:
    - main
    # Allow a safe manual run before students trigger it with a code change.
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

# env:

env:
  # Keep common image values in one place so the build steps stay readable.
  IMAGE_NAME: tiny-health-app
  IMAGE_TAR: tiny-health-app.tar
  ARTIFACT_NAME: tiny-health-app-image 
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: actions/lab
  IMAGE_TAG: ${{ github.action.run_id }}

jobs:
  run-tests:
    # The runner is the temporary machine that executes the steps below.
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        # Download the repository contents onto the runner.
        uses: actions/checkout@v6

      - name: Set up Python
        # Prepare Python on the runner. This does not change the student laptop.
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run tests
        # This is the key verification step in the CI workflow.
        run: python -m unittest discover -s tests -v

  build-package:
    # Use a fresh GitHub-hosted runner for the build.
    runs-on: ubuntu-latest
    needs: run-tests

    steps:
        - name: Check out repository
        # Get the repository files onto the runner.
          uses: actions/checkout@v6

        - name: Set up Python
        # Prepare Python so the workflow can run the tests first.
          uses: actions/setup-python@v6
          with:
              python-version: "3.12"

        - name: Set image tag
        # Use today's UTC date plus the GitHub run ID.
        # This keeps the tag easy to explain and still unique for the run.
          id: image-tag
          run: |
            TODAY="$(date -u +%Y-%m-%d)"
            IMAGE_TAG="${TODAY}-${GITHUB_RUN_ID}"
            echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

        # - name: Build Docker image 
        # # Create the packaged application image with one traceable tag.
        # # The deploy workflow will run this exact same tag later.
        #   run: |
        #     docker build \
        #     -t "${IMAGE_NAME}:${{ steps.image-tag.outputs.image_tag }}" \
        #     .

        # - name: Save Docker image as artifact file
        # # Convert that exact tagged image into a file that can be reused later.
        #   run: docker save "${IMAGE_NAME}:${{ steps.image-tag.outputs.image_tag }}" -o "${IMAGE_TAR}"
