name: EX-10 Continuos Delivery

on: # Listen for the build workflow by name.
    pull_request:
      types:
      - closed
      branches:
      - main
    workflow_dispatch:
      
permissions:
  id-token: write
  contents: read


env:
  # Keep common image values in one place so the build steps stay readable.
  IMAGE_NAME: tiny-health-app
  CONTAINER_NAME: tiny-health-container
  APP_PORT: "8000"
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: actions/lab


jobs:
  deploy-package:
    # Use a fresh runner for the deployment simulation.
    runs-on: ubuntu-latest


    steps:
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/actions-ecr
          aws-region: ${{ env.AWS_REGION }}

      - name: Fetch the caller identity
        run: | 
            aws sts get-caller-identity
                      
      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh

          # Write private key
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key

          # Add EC2 host to known_hosts (prevents interactive prompt)
          ssh-keyscan -H ${{ vars.EC2_IP }} >> ~/.ssh/known_hosts
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}


        # SSH is working  
   
      - name: Testing SSH 
        run: |
          ssh -i ~/.ssh/ec2_key ubuntu@${{ vars.EC2_IP }} \
          "echo Connected && whoami && hostname" 

      # Cloning the repository contents to copy scripts.
      - name: Check out repository
        uses: actions/checkout@v6
      
      - name: Copying & Executing scripts
        run: |
          scp -i -r ~/.ssh/ec2_key ./scripts/ ubuntu@${{ vars.EC2_IP }}:/tmp/
          ssh -i ~/.ssh/ec2_key ubuntu@${{ vars.EC2_IP }} "chmod +x -R /tmp/scripts/"
          ssh -i ~/.ssh/ec2_key ubuntu@${{ vars.EC2_IP }} "bash /tmp/scripts/assessment/prepare-ubuntu-vm.sh"
         
      
