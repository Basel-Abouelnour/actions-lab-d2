name: EX-10 Continuos Delivery

on: # Listen for the build workflow by name.
    pull_request:
      types:
      - closed
      branches:
      - main
    workflow_dispatch:
      
permissions:
  id-token: write
  contents: read


env:
  # Keep common image values in one place so the build steps stay readable.
  IMAGE_NAME: tiny-health-app
  CONTAINER_NAME: tiny-health-container
  APP_PORT: "8000"
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: actions/lab


jobs:
  deploy-package:
    # Use a fresh runner for the deployment simulation.
    runs-on: ubuntu-latest


    steps:
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/actions-ecr
          aws-region: ${{ env.AWS_REGION }}

      - name: Fetch the caller identity
        run: | 
            aws sts get-caller-identity
                      
      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh

          # Write private key
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key

          # Add EC2 host to known_hosts (prevents interactive prompt)
          ssh-keyscan -H ${{ vars.EC2_IP }} >> ~/.ssh/known_hosts
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}


        # SSH is working  
   
      - name: Testing SSH 
        run: |
          ssh -i ~/.ssh/ec2_key ubuntu@${{ vars.EC2_IP }} \
          "echo Connected && whoami && hostname" 

      # Cloning the repository contents to copy scripts.
      - name: Check out repository
        uses: actions/checkout@v6
      
      - name: Listing files
        run: tree

      - name: Copy scripts folder
        run: |
         scp -r -i ~/.ssh/ec2_key ./scripts \
            ubuntu@${{ vars.EC2_IP }}:/tmp/

      - name: Execute target script
        run: |
          ssh -i ~/.ssh/ec2_key ubuntu@${{ vars.EC2_IP }} \
          "chmod +x /tmp/scripts/assessment/prepare-ubuntu-vm.sh && \
          sudo /tmp/scripts/assessment/prepare-ubuntu-vm.sh"
      - name: Get ECR login password
        id: ecr
        run: |
          echo "PASSWORD=$(aws ecr get-login-password --region $AWS_REGION)" >> $GITHUB_OUTPUT

      - name: Login + Pull on EC2
        run: |
          ssh -i ~/.ssh/ec2_key ubuntu@${{ vars.EC2_IP }} \
          "echo '${{ steps.ecr.outputs.PASSWORD }}' | \
          docker login --username AWS --password-stdin ${ECR_REGISTRY} && \
          docker pull ${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"

        
      - name: List Docker images on EC2
        run: |
          ssh -i ~/.ssh/ec2_key ubuntu@${{ vars.EC2_IP }} "docker image ls"

      - name: Start container
        # Start the exact same tagged image that the build workflow created.
        run: |
          ssh -i ~/.ssh/ec2_key ubuntu@${{ vars.EC2_IP }} \
          "docker run -d \
            --name ${{ env.CONTAINER_NAME }} \
            -p ${{ env.APP_PORT }}:8000 \
            ${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"

      - name: Show running container
        run: | 
          ssh -i ~/.ssh/ec2_key ubuntu@${{ vars.EC2_IP }} "docker ps"

      # - name: Smoke test on EC2
      #   run: |
      #     ssh -i ~/.ssh/ec2_key ubuntu@${{ vars.EC2_IP }} "
      #       for attempt in 1 2 3 4 5; do
      #         if curl --fail --silent http://127.0.0.1:${{ env.APP_PORT }}/health; then
      #           curl -o /dev/null -s -w '%{http_code}\n' http://127.0.0.1:${{ env.APP_PORT }}/health
      #           exit 0
      #         fi

      #         curl -o /dev/null -s -w '%{http_code}\n' http://127.0.0.1:${{ env.APP_PORT }}/health
      #         sleep 2
      #       done

      #       echo 'App did not become ready in time.'
      #       exit 1
      #     "
      - name: Running validation script
        run: |
          bash scripts/assessment/validate-deployment.sh http://${{ vars.EC2_IP }}:8000
          
      - name: Stop container
        if: always()
        # Clean up even if an earlier step fails.
        run: ssh -i ~/.ssh/ec2_key ubuntu@${{ vars.EC2_IP }} "docker rm -f ${CONTAINER_NAME} || true"
