name: EX-10 Continuos Delivery

on: # Listen for the build workflow by name.
    workflow_run:
      workflows: ["EX-10 Continuos Integration"]
      types:
      - completed
    pull_request:
      types:
      - closed
      branches:
      - main
      
env:
  IMAGE_NAME: tiny-health-app
  IMAGE_TAR: tiny-health-app.tar
  ARTIFACT_NAME: tiny-health-app-image
  CONTAINER_NAME: tiny-health-container
  APP_PORT: "8000"

permissions:
  # Read access is enough because this workflow only downloads artifacts and reads repo data.
  actions: read
  contents: read

jobs:
  deploy-package:
    # Use a fresh runner for the deployment simulation.
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifact
        # Download the exact artifact produced by the build run.
        uses: actions/download-artifact@v4
        if: github.event_name == 'workflow_run'
        with:
          name: ${{ env.ARTIFACT_NAME }}
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          path: downloaded-artifact
          run-id: ${{ github.event.workflow_run.id }}

      - name: Show downloaded files
        # Quick visibility step so students can see what arrived from the build.
        run: ls -R downloaded-artifact

      - name: Load Docker image
        # Turn the saved artifact file back into a Docker image.
        run: docker load --input "downloaded-artifact/${IMAGE_TAR}"

      - name: Recreate image tag from build run
        # Rebuild the same date-plus-run-id tag the build workflow created.
        id: image-tag
        run: |
          BUILD_DATE="$(echo "${{ github.action.build.data }}" | cut -dT -f1)"
          IMAGE_TAG="${BUILD_DATE}-${{ github.action.build.id }}"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Start container
        # Start the exact same tagged image that the build workflow created.
        run: |
          docker run -d \
            --name "${CONTAINER_NAME}" \
            -p "${APP_PORT}:8000" \
            "${IMAGE_NAME}:${{ steps.image-tag.outputs.image_tag }}"
      - name: Show running container
        run: | 
          docker ps

      - name: Smoke test deployed app
        # Retry a few times because app startup can take a moment.
        run: |
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent "http://127.0.0.1:${APP_PORT}/health"; then
              echo "$(curl -o /dev/null -s -w "%{http_code}\n" http://127.0.0.1:${APP_PORT}/health)"
              exit 0
            fi
            echo "$(curl -o /dev/null -s -w "%{http_code}\n" http://127.0.0.1:${APP_PORT}/health)"
            sleep 2
          done
          echo "App did not become ready in time."
          exit 1

      - name: Stop container
        if: always()
        # Clean up even if an earlier step fails.
        run: docker rm -f "${CONTAINER_NAME}" || true
